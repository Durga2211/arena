<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="description" content="Squiz - Play real-time quizzes, compete with 10 players, and win real cash prizes. Join rooms, test your knowledge, and earn rewards." />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Squiz — Play Quizzes, Win Real Cash</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>
  <body>
    <div id="error-display" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-display').textContent += '\n' + e.message + '\n' + e.filename + ':' + e.lineno + '\n' + (e.error ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-display').textContent += '\nUnhandled Promise Rejection: ' + e.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
